# GitHub Actions - Auto-deploy Jarvis to Render
name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          SERVICE_ID="${{ secrets.RENDER_SERVICE_ID }}"
          if [ -z "$SERVICE_ID" ]; then
            echo "RENDER_SERVICE_ID not set, looking for service..."
            SERVICES=$(curl -s "https://api.render.com/v1/services" -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
            SERVICE_ID=$(echo "$SERVICES" | python3 -c "import sys,json; d=json.load(sys.stdin); print(next((s['service']['id'] for s in d if 'jarvis' in s['service']['name'].lower()), ''))")
            if [ -z "$SERVICE_ID" ]; then
              echo "Could not find Jarvis service"
              exit 1
            fi
          fi
          echo "Deploying service: $SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' | jq .