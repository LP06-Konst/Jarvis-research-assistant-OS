# GitHub Actions - Auto-deploy Jarvis to Render
name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          # Get service ID if not set
          SERVICE_ID="${{ secrets.RENDER_SERVICE_ID }}"
          if [ -z "$SERVICE_ID" ]; then
            echo "RENDER_SERVICE_ID not set, checking for existing services..."
            # Try to find the service from Render API
            SERVICES=$(curl -s "https://api.render.com/v1/services" -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}")
            echo "Found services: $(echo $SERVICES | python3 -c 'import sys,json; d=json.load(sys.stdin); print([s.get(\"service\",{}).get(\"name\",\"\") for s in d])')"
            # Parse the response - it has nested structure
            SERVICE_ID=$(echo "$SERVICES" | python3 -c "
import sys,json
d=json.load(sys.stdin)
for item in d:
    svc = item.get('service', {})
    name = svc.get('name','').lower()
    if 'jarvis' in name:
        print(svc.get('id',''))
        break
" 2>/dev/null)
            if [ -z "$SERVICE_ID" ]; then
              echo "Could not find Jarvis service. Skipping deploy."
              exit 0
            fi
          fi
          
          echo "Triggering deploy for service: $SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' | jq .