# GitHub Actions - Auto-deploy Jarvis to Render
name: Deploy to Render

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Deploy to Render
        if: github.ref == 'refs/heads/main'
        run: |
          # Get or create the Render blueprint
          curl -s -X GET "https://api.render.com/v1/blueprints" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json"
          
          # Create or update service via Render API
          curl -s -X POST "https://api.render.com/v1/services" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "jarvis-research-os",
              "type": "web",
              "region": "oregon",
              "plan": "free",
              "buildCommand": "pip install -r requirements.txt",
              "startCommand": "python server.py",
              "envVars": [
                {"key": "HOST", "value": "0.0.0.0"},
                {"key": "PORT", "value": "10000"}
              ]
            }'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      
      - name: Verify deployment
        run: |
          echo "Deployment triggered. Check Render dashboard: https://dashboard.render.com"