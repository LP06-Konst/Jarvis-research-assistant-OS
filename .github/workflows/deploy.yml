# GitHub Actions - Auto-deploy Jarvis to Render
name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy
        run: |
          SERVICE_ID="${{ secrets.RENDER_SERVICE_ID }}"
          if [ -z "$SERVICE_ID" ]; then
            echo "RENDER_SERVICE_ID not set, using default..."
            SERVICE_ID="srv-d8ipg8eq1p3s73f0e920"
          fi
          echo "Deploying service: $SERVICE_ID"
          curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' | jq .