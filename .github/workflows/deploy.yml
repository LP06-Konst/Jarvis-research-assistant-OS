# GitHub Actions - Auto-deploy Jarvis to Render
name: Deploy to Render

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Trigger Render Deploy
        run: |
          echo "Pushing to GitHub triggers Render auto-deploy"
          echo "If Render isn't auto-deploying, check:"
          echo "1. Render dashboard -> Service -> Settings -> Git"
          echo "2. Ensure 'Auto-deploy from GitHub' is enabled"
          echo "3. Check the branch matches (main)"