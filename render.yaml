# Render Blueprint - Jarvis Research OS
# Auto-deploys from GitHub on push to main branch

services:
  - type: web
    name: jarvis-research-os
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"